---
- name: Download Nomad
  get_url:
    url: "https://releases.hashicorp.com/nomad/{{ nomad_version }}/nomad_{{ nomad_version }}_linux_amd64.zip"
    dest: /tmp/nomad.zip
  register: nomad_download

- name: Install Nomad
  unarchive:
    src: /tmp/nomad.zip
    dest: /usr/local/bin/
    remote_src: yes
  when: nomad_download.changed

- name: Create Nomad config dir
  file:
    path: /etc/nomad.d
    state: directory
    mode: "0755"

- name: Create Nomad data dir
  file:
    path: "{{ nomad_data_dir }}"
    state: directory
    mode: "0755"

- name: Write Nomad server config
  template:
    src: nomad-server.hcl.j2
    dest: /etc/nomad.d/nomad.hcl
  notify: restart nomad

- name: Write Nomad systemd unit
  copy:
    content: |
      [Unit]
      Description=Nomad Agent
      After=network.target consul.service

      [Service]
      ExecStart=/usr/local/bin/nomad agent -config=/etc/nomad.d
      Restart=on-failure
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/nomad.service
  notify: restart nomad

- name: Enable and start Nomad
  systemd:
    name: nomad
    enabled: yes
    state: started
    daemon_reload: yes

handlers:
  - name: restart nomad
    systemd:
      name: nomad
      state: restarted
      daemon_reload: yes
