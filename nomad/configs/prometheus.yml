global:
  scrape_interval: 15s

scrape_configs:
  - job_name: nomad
    metrics_path: /v1/metrics
    params:
      format: [prometheus]
    static_configs:
      - targets: ["localhost:4646"]

  - job_name: iptables-exporter
    static_configs:
      - targets: ["localhost:9119"]

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]
