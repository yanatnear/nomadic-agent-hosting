server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nomad-allocs
    static_configs:
      - targets: [localhost]
        labels:
          __path__: /var/lib/nomad/alloc/*/alloc/logs/*.stdout.*
          source: nomad
    pipeline_stages:
      - regex:
          expression: '/var/lib/nomad/alloc/(?P<alloc_id>[^/]+)/'
      - labels:
          alloc_id:
